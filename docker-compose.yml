services:
  akb:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: akb
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 4000
    ports:
      - "4000:4000"
    volumes:
      - ./database:/app/database
    healthcheck:
      test: ["CMD", "node", "-e", "require(\"http\").get(\"http://127.0.0.1:4000/\", r => process.exit(r.statusCode === 200 ? 0 : 1)).on(\"error\", () => process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
