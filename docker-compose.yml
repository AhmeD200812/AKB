services:
  akb:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: akb
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: ${AKB_PORT:-3040}
    ports:
      - "${AKB_PORT:-3040}:${AKB_PORT:-3040}"
    volumes:
      - ./database:/app/database
    healthcheck:
      test: ["CMD", "node", "-e", "require(\"http\").get(\"http://127.0.0.1:${AKB_PORT:-3040}/\", r => process.exit(r.statusCode === 200 ? 0 : 1)).on(\"error\", () => process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
